<div class="p-6 min-h-screen bg-orange-50/30">
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
    <div>
      <h2 class="text-3xl font-bold text-[#4A2C2A]">Gestión de Usuarios</h2>
      <p class="text-gray-600">Administración de accesos y estados de usuarios del sistema.</p>
    </div>

    <div class="flex items-center gap-4 flex-wrap">
      <label class="inline-flex items-center gap-3 bg-white border border-gray-200 rounded-xl px-4 py-2 shadow-sm">
        <span class="text-sm font-semibold text-gray-700">Mostrar Inactivos</span>
        <input class="h-5 w-10 accent-[#E67E22]" type="checkbox" id="filtroInactivos" [(ngModel)]="verInactivos" (change)="cargarUsuarios()" />
      </label>

      <button class="flex items-center gap-2 px-6 py-3 rounded-xl font-semibold transition-all duration-200 transform hover:scale-105 shadow-md bg-gradient-to-r from-[#4A2C2A] to-[#E67E22] text-white hover:shadow-lg hover:brightness-110" (click)="abrirModal()" type="button">
        + Nuevo Usuario
      </button>
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead class="bg-gray-50 border-b border-gray-100">
          <tr>
            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Nombre</th>
            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Apellido</th>
            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Email</th>
            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Rol</th>
            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Estado</th>
            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider text-right">Acciones</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
          <tr *ngFor="let u of usuarios" class="hover:bg-orange-50/50 transition-colors group">
            <td class="px-6 py-4 text-sm font-medium text-[#4A2C2A]">{{ u.nombre }}</td>
            <td class="px-6 py-4 text-sm text-gray-700">{{ u.apellido }}</td>
            <td class="px-6 py-4 text-sm text-gray-600">{{ u.email }}</td>
            <td class="px-6 py-4">
              <span class="px-3 py-1 bg-orange-100 text-[#E67E22] rounded-full text-sm font-semibold">{{ u.rolNombre }}</span>
            </td>
            <td class="px-6 py-4">
              <span class="px-3 py-1 rounded-full text-sm font-semibold" [ngClass]="u.activo ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'">
                {{ u.activo ? 'Activo' : 'Inactivo' }}
              </span>
            </td>
            <td class="px-6 py-4 text-right">
              <div class="flex justify-end gap-4">
                <button (click)="abrirModal(u)" class="text-[#4A2C2A] hover:scale-110 transition" title="Modificar">
                  <lucide-icon [img]="Pencil" [size]="20"></lucide-icon>
                </button>
                <button (click)="toggleActivo(u)" class="transition hover:scale-110" [ngClass]="u.activo ? 'text-red-500' : 'text-green-600'" [title]="u.activo ? 'Desactivar' : 'Activar'">
                  <lucide-icon [img]="u.activo ? Ban : CheckCircle" [size]="20"></lucide-icon>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="modal d-block" tabindex="-1" *ngIf="mostrarModal" style="background: rgba(0, 0, 0, 0.5)">
    <div class="modal-dialog">
      <div class="modal-content usuarios-modal">
        <div class="modal-header usuarios-modal-header">
          <h5 class="modal-title text-white font-semibold text-lg">{{ tituloModal }}</h5>
          <button type="button" class="btn-close usuarios-close" (click)="cerrarModal()"></button>
        </div>
        <div class="modal-body usuarios-modal-body">
          <form (ngSubmit)="guardar()">
            <div class="mb-3">
              <label class="usuarios-label">Nombre</label>
              <input type="text" class="form-control usuarios-input" [(ngModel)]="datosForm.nombre" name="nombre" required />
            </div>
            <div class="mb-3">
              <label class="usuarios-label">Apellido</label>
              <input type="text" class="form-control usuarios-input" [(ngModel)]="datosForm.apellido" name="apellido" required />
            </div>
            <div class="mb-3">
              <label class="usuarios-label">Email</label>
              <input type="email" class="form-control usuarios-input" [(ngModel)]="datosForm.email" name="email" required />
            </div>
            <div class="mb-3">
              <label class="usuarios-label">Rol</label>
              <select class="form-select usuarios-input" [(ngModel)]="datosForm.rolId" name="rolId">
                <option [value]="0">-- Seleccionar Rol --</option>
                <option *ngFor="let r of roles" [value]="r.id">{{ r.nombre }}</option>
              </select>
            </div>
            <div *ngIf="!esEdicion">
              <div class="mb-3">
                <label class="usuarios-label">Contraseña</label>
                <div class="position-relative">
                  <input [type]="mostrarPassword ? 'text' : 'password'" class="form-control usuarios-input" [(ngModel)]="datosForm.password" name="password" />
                  <button type="button" class="btn position-absolute top-50 end-0 translate-middle-y border-0 bg-transparent" (click)="toggleMostrarPassword()">
                    <lucide-icon [img]="mostrarPassword ? EyeOff : Eye" [size]="20" class="text-gray-400"></lucide-icon>
                  </button>
                </div>
              </div>
              <div class="mb-3">
                <label class="usuarios-label">Confirmar Contraseña</label>
                <div class="position-relative">
                  <input [type]="mostrarConfirmarPassword ? 'text' : 'password'" class="form-control usuarios-input" [(ngModel)]="datosForm.confirmarPassword" name="confirmarPassword" />
                  <button type="button" class="btn position-absolute top-50 end-0 translate-middle-y border-0 bg-transparent" (click)="toggleMostrarConfirmarPassword()">
                    <lucide-icon [img]="mostrarConfirmarPassword ? EyeOff : Eye" [size]="20" class="text-gray-400"></lucide-icon>
                  </button>
                </div>
              </div>
            </div>
            <div class="usuarios-modal-footer">
              <button type="button" class="usuarios-btnSecondary" (click)="cerrarModal()">Cancelar</button>
              <button type="submit" class="usuarios-btnPrimary">Guardar</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
