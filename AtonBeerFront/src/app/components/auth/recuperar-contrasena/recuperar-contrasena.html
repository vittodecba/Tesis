<div class="min-h-screen bg-gradient-to-br from-orange-50 to-amber-100 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
    
    <div class="bg-gradient-to-r from-[#4A2C2A] to-[#E67E22] p-8 text-center text-white">
      <div class="w-16 h-16 bg-white/20 rounded-full mx-auto mb-4 flex items-center justify-center backdrop-blur-sm">
        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
        </svg>
      </div>
      <h1 class="text-3xl font-bold tracking-tight">Aton Beer</h1>
      <p class="text-orange-100 mt-2 text-sm font-medium">Recuperar Acceso</p>
    </div>

    <div class="p-8 text-center">
      <h2 class="text-2xl font-bold text-[#4A2C2A] mb-2">¿Olvidaste tu contraseña?</h2>
      <p class="text-gray-500 mb-8 text-sm">Ingresá tu email y te enviaremos el código para restablecerla.</p>

      <div class="space-y-6">
        <div class="text-left">
          <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Correo Electrónico</label>
          <input type="email" [(ngModel)]="email" placeholder="nombre@ejemplo.com" [disabled]="cargando" 
                 class="w-full px-4 py-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-[#E67E22] bg-gray-50 transition-all" />
        </div>

        <button (click)="enviarSolicitud()" [disabled]="cargando" 
                class="w-full bg-gradient-to-r from-[#4A2C2A] to-[#E67E22] text-white py-3 rounded-xl font-bold shadow-md hover:brightness-110 transition-all transform hover:scale-[1.02] disabled:opacity-50">
          <span *ngIf="!cargando">Enviar Código</span>
          <span *ngIf="cargando">Enviando...</span>
        </button>
      </div>

      <div class="mt-8 text-center pt-6 border-t border-gray-100">
        <a routerLink="/login" class="text-gray-400 text-sm font-semibold hover:text-[#4A2C2A] transition-colors">
          Volver al Inicio
        </a>
      </div>
    </div>
  </div>
</div>
