<div class="min-h-screen bg-gradient-to-br from-orange-50 to-amber-100 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
    
    <div class="bg-gradient-to-r from-[#4A2C2A] to-[#E67E22] p-8 text-center text-white">
      <div class="w-16 h-16 bg-white/20 rounded-full mx-auto mb-4 flex items-center justify-center backdrop-blur-sm">
        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
      </div>
      <h1 class="text-3xl font-bold tracking-tight">Aton Beer</h1>
      <p class="text-orange-100 mt-1 text-sm font-medium">Seguridad de la Cuenta</p>
    </div>

    <div class="p-8">
      <h2 class="text-2xl font-bold text-[#4A2C2A] mb-2 text-center">Restablecer Contraseña</h2>
      <p class="text-gray-500 mb-6 text-center text-sm">Completá los datos para actualizar tu acceso.</p>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Tu Email</label>
          <input type="email" [(ngModel)]="email" placeholder="ejemplo@correo.com" 
            class="w-full px-4 py-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-[#E67E22] bg-gray-50 transition-all" />
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Código de Seguridad</label>
          <input type="text" [(ngModel)]="token" placeholder="Pegá el código GUID aquí" 
            class="w-full px-4 py-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-[#E67E22] bg-gray-50 font-mono text-sm transition-all" />
        </div>

        <div class="relative">
          <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Nueva Contraseña</label>
          <div class="relative flex items-center">
            <input [type]="mostrarPassword ? 'text' : 'password'" [(ngModel)]="nuevaPassword" placeholder="Mínimo 6 caracteres" 
              class="w-full px-4 py-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-[#E67E22] bg-gray-50 transition-all" />
            <button type="button" (click)="toggleMostrarPassword()" class="absolute right-3 text-gray-400 border-0 bg-transparent outline-none">
              <lucide-icon [img]="mostrarPassword ? EyeOff : Eye" [size]="20"></lucide-icon>
            </button>
          </div>
        </div>

        <div class="relative">
          <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Confirmar Contraseña</label>
          <div class="relative flex items-center">
            <input [type]="mostrarConfirmarPassword ? 'text' : 'password'" [(ngModel)]="confirmarPassword" placeholder="Repetí la contraseña" 
              class="w-full px-4 py-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-[#E67E22] bg-gray-50 transition-all" />
            <button type="button" (click)="toggleMostrarConfirmarPassword()" class="absolute right-3 text-gray-400 border-0 bg-transparent outline-none">
              <lucide-icon [img]="mostrarConfirmarPassword ? EyeOff : Eye" [size]="20"></lucide-icon>
            </button>
          </div>
        </div>

        <button (click)="confirmarRestablecimiento()" [disabled]="cargando" 
          class="w-full bg-gradient-to-r from-[#4A2C2A] to-[#E67E22] text-white py-4 rounded-xl font-bold shadow-lg hover:brightness-110 transition-all transform hover:scale-[1.02] disabled:opacity-50">
          <span *ngIf="!cargando">Actualizar Contraseña</span>
          <span *ngIf="cargando">Guardando...</span>
        </button>
      </div>

      <div class="mt-8 text-center pt-6 border-t border-gray-100">
        <a routerLink="/login" class="text-gray-400 text-sm font-semibold hover:text-[#4A2C2A] transition-colors">
          Volver al Inicio de Sesión
        </a>
      </div>
    </div>
  </div>
</div>
