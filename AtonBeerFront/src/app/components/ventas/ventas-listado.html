<div class="p-6 min-h-screen bg-orange-50/30 text-start font-sans relative">
  
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
    <div>
      <h2 class="text-3xl font-bold text-[#4A2C2A]">Gestión de Ventas</h2>
      <p class="text-gray-600 font-medium">Listado y filtrado de ventas registradas.</p>
    </div>
    
    <button class="flex items-center gap-2 bg-[#E67E22] text-white px-5 py-2.5 rounded-xl font-bold hover:bg-[#D6731B] transition-colors shadow-sm">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
      </svg>
      Exportar Reporte PDF
    </button>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-orange-100/60 p-6 mb-8">
    <form [formGroup]="filtroForm" class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="space-y-2">
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider">Fecha de Venta</label>
        <div class="relative">
          <input type="date" formControlName="fecha" class="w-full border-2 border-gray-100 rounded-xl py-2.5 px-4 outline-none bg-gray-50/50 focus:border-[#E67E22] focus:bg-white transition-all text-gray-700 font-medium" />
        </div>
      </div>
      <div class="space-y-2">
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider">Cliente / Razón Social</label>
        <input type="text" formControlName="clienteNombre" placeholder="Buscar por cliente..." class="w-full border-2 border-gray-100 rounded-xl py-2.5 px-4 outline-none bg-gray-50/50 focus:border-[#E67E22] focus:bg-white transition-all text-gray-700 font-medium" />
      </div>
      <div class="space-y-2">
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider">Estado de Pago</label>
        <select formControlName="estadoPago" class="w-full border-2 border-gray-100 rounded-xl py-2.5 px-4 outline-none bg-gray-50/50 focus:border-[#E67E22] focus:bg-white transition-all text-gray-700 font-medium cursor-pointer">
          <option value="">Todos los estados</option>
          <option value="Pagado">Pagado</option>
          <option value="Pendiente">Pendiente</option>
        </select>
      </div>
    </form>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let v of ventasFiltradas" class="flex flex-col bg-gradient-to-br from-white to-orange-50/30 rounded-2xl shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 border border-orange-100/80">
      
      <div class="p-6 flex-1">
        <div class="flex justify-between items-start mb-4">
          <span class="inline-flex items-center justify-center px-2.5 py-1 rounded-md bg-white border border-gray-100 text-gray-500 text-xs font-bold tracking-widest shadow-sm">
            #{{ v.idVenta }}
          </span>
          <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest flex items-center gap-1.5"
                [ngClass]="v.estadoPago === 'Pagado' ? 'bg-green-100/80 text-green-700 border border-green-200' : 'bg-red-100/80 text-red-700 border border-red-200'">
            <span class="w-1.5 h-1.5 rounded-full" [ngClass]="v.estadoPago === 'Pagado' ? 'bg-green-500' : 'bg-red-500 animate-pulse'"></span>
            {{ v.estadoPago }}
          </span>
        </div>
        
        <h3 class="text-xl font-bold text-[#4A2C2A] mb-5 truncate" [title]="v.clienteNombre">{{ v.clienteNombre }}</h3>
        
        <div class="space-y-2.5">
          <div class="flex items-center text-gray-600 bg-white/80 p-2.5 rounded-xl border border-gray-100/50 shadow-sm">
            <svg class="w-4 h-4 mr-2.5 text-[#E67E22]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-[11px] font-bold uppercase tracking-wider w-16 text-gray-400">Fecha:</span>
            <span class="text-sm font-bold text-gray-700">{{ v.fechaVenta }}</span>
          </div>
          <div class="flex items-center text-gray-600 bg-white/80 p-2.5 rounded-xl border border-gray-100/50 shadow-sm">
            <svg class="w-4 h-4 mr-2.5 text-[#E67E22]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
            <span class="text-[11px] font-bold uppercase tracking-wider w-16 text-gray-400">Método:</span>
            <span class="text-sm font-bold text-gray-700">{{ v.metodoPago }}</span>
          </div>
        </div>
      </div>

      <div class="px-6 py-5 bg-[#4A2C2A] rounded-b-2xl flex justify-between items-center border-t border-[#3A2220]">
        <div>
          <span class="text-[10px] font-bold text-orange-200/80 uppercase tracking-widest block mb-1">Monto Total</span>
          <div class="flex items-start text-white">
            <span class="text-sm font-medium mt-1 mr-1">$</span>
            <span class="text-3xl font-black tracking-tight">{{ v.total | number:'1.2-2' }}</span>
          </div>
        </div>
        
        <button class="bg-[#E67E22] hover:bg-[#D6731B] text-white p-3 rounded-xl transition-all duration-300 shadow-lg shadow-[#E67E22]/20 flex items-center justify-center group" title="Ver Factura PDF">
          <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
          </svg>
        </button>
      </div>
    </div>

    <div *ngIf="ventasFiltradas.length === 0" class="col-span-full bg-white rounded-2xl p-12 flex flex-col items-center justify-center border-2 border-dashed border-gray-200">
      <div class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mb-4">
        <svg class="w-8 h-8 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      </div>
      <p class="text-gray-500 font-bold text-lg">No se encontraron resultados.</p>
      <p class="text-gray-400 font-medium text-sm mt-1">Intentá ajustando los filtros de búsqueda.</p>
    </div>
  </div>
</div>
