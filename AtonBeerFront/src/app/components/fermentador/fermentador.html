<div class="p-6 min-h-screen bg-orange-50/30">
  
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
    <div>
      <h2 class="text-3xl font-bold text-[#4A2C2A]">Gestión de Fermentadores</h2>
      <p class="text-gray-600">Administración de tanques y estado de fermentación.</p>
    </div>

    <button
      class="flex items-center gap-2 px-6 py-3 rounded-xl font-semibold transition-all duration-200 transform hover:scale-105 shadow-md bg-gradient-to-r from-[#4A2C2A] to-[#E67E22] text-white hover:shadow-lg"
      (click)="abrirModal()"
      type="button"
    >
      <lucide-icon [img]="Plus" [size]="18"></lucide-icon>
      Nuevo Fermentador
    </button>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead class="bg-gray-50 border-b border-gray-100">
          <tr>
            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Tanque</th>
            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Capacidad</th>
            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Estado</th>
            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Observaciones</th>
            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider text-right">Acciones</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
          <tr *ngFor="let item of listaFermentadores" class="hover:bg-orange-50/50 transition-colors group">
            <td class="px-6 py-4 text-sm font-medium text-[#4A2C2A]">
                {{ item.nombre }}
            </td>
            <td class="px-6 py-4 text-sm text-gray-700">{{ item.capacidad }} Lts</td>
            <td class="px-6 py-4">
              <span class="px-3 py-1 rounded-full text-sm font-semibold"
                [ngClass]="item.estado === 'Disponible' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'">
                {{ item.estado }}
              </span>
            </td>
            <td class="px-6 py-4 text-sm text-gray-500 italic">{{ item.observaciones || 'Sin notas' }}</td>
            <td class="px-6 py-4 text-right">
              <div class="flex justify-end gap-4">
                <button class="text-[#4A2C2A] hover:scale-110 transition" title="Editar">
                  <lucide-icon [img]="Pencil" [size]="20"></lucide-icon>
                </button>
                <button class="text-red-500 hover:scale-110 transition" title="Eliminar">
                  <lucide-icon [img]="Trash2" [size]="20"></lucide-icon>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div *ngIf="mostrarModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="bg-white rounded-lg shadow-xl w-full max-w-md overflow-hidden">
        <div class="bg-[#4A2C2A] p-4 flex justify-between items-center">
            <h5 class="text-white font-semibold text-lg">Registrar Fermentador</h5>
            <button (click)="cerrarModal()" class="text-white hover:text-gray-300 text-xl">✕</button>
        </div>
        <div class="p-6">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nombre / Código</label>
                    <input [(ngModel)]="nuevoFermentador.nombre" name="nombre" placeholder="Ej: F-01" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-[#E67E22] outline-none" />
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Capacidad (Litros)</label>
                    <input [(ngModel)]="nuevoFermentador.capacidad" name="capacidad" type="number" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-[#E67E22] outline-none" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Observaciones</label>
                    <textarea [(ngModel)]="nuevoFermentador.observaciones" name="obs" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-[#E67E22] outline-none h-24 resize-none"></textarea>
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-3 border-t pt-4">
                <button (click)="cerrarModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">Cancelar</button>
                <button (click)="guardarFermentador()" class="px-6 py-2 rounded-lg font-semibold bg-gradient-to-r from-[#4A2C2A] to-[#E67E22] text-white shadow hover:shadow-lg transition">Guardar</button>
            </div>
        </div>
    </div>
  </div>
</div>
